# Cedar — Render Blueprint: managed Postgres + the autonomous API service.
# Deploy: push to GitHub, then Render Dashboard → New → Blueprint → pick this repo.
# Set the three secret env vars (sync:false) in the dashboard after creation.
databases:
  - name: cedar-db
    plan: free
    databaseName: cedar
    user: cedar

services:
  - type: web
    name: cedar-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # NOTE: free web services sleep after ~15m idle, which
                          # pauses the autonomous loop. Use a paid plan (or an
                          # external keep-alive ping to /healthz) for true 24/7.
    healthCheckPath: /healthz
    numInstances: 1       # MUST stay 1 — the scheduler is an in-process thread.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cedar-db
          property: connectionString
      # --- runtime posture: real reads + Claude; safe (mock) signer by default ---
      - key: CEDAR_DATA_SOURCE
        value: casper
      - key: CEDAR_SIGNER
        value: casper      # real on-chain signing (mock = fabricated hashes only)
      - key: CEDAR_AUTOSTART
        value: "1"
      - key: CEDAR_INTERVAL
        value: "300"       # 5 min; real MCP reads + one Claude call per cycle
      - key: CEDAR_LLM_PROVIDER
        value: groq
      - key: CEDAR_MODEL
        value: llama-3.3-70b-versatile
      # --- chain + MCP endpoints (testnet) ---
      - key: CASPER_NODE_URL
        value: https://node.testnet.casper.network/rpc
      - key: CASPER_CHAIN
        value: casper-test
      - key: VAULT_ROUTER_HASH
        value: hash-afdbf6c32a6f6a54ec5aff5ebd8dbd2a92f672cd60e089cf7cb50ed55bc71d7c
      - key: CEDAR_MOTES_SCALE
        value: "1000000000"   # v3 stores motes; 1e9 maps to whole CSPR (v2 used 1)
      - key: CSPR_TRADE_MCP_URL
        value: https://mcp.cspr.trade/mcp
      - key: CASPER_MCP_URL
        value: https://mcp.testnet.cspr.cloud/mcp
      - key: X_CASPER_NETWORK
        value: testnet
      # --- secrets: set these in the Render dashboard (never committed) ---
      - key: GROQ_API_KEY
        sync: false
      - key: CSPR_CLOUD_API_KEY
        sync: false
      # base64 of the owner's secret_key.pem — decoded to a file at startup.
      # Generate: base64 -w0 "Account 1_secret_key.pem"   (macOS: base64 -i …)
      - key: CASPER_SECRET_KEY_B64
        sync: false
